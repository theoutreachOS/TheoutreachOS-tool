<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OutreachOS - Generation Tool</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background: #060d1a; color: #e2eaf5; font-family: 'DM Sans', sans-serif; }
        .sora { font-family: 'Sora', sans-serif; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const STEPS = [
            { n: 1, label: "Your Business" },
            { n: 2, label: "Your Offer" },
            { n: 3, label: "Your Target" },
            { n: 4, label: "Generate" },
        ];

        const INDUSTRIES = ["SaaS / Software", "Marketing Agency", "Consulting", "Real Estate", "Financial Services", "Recruiting / HR", "E-commerce", "Healthcare", "Legal Services", "Construction / Trades", "Other B2B"];
        const GOALS = ["Book sales calls", "Generate leads", "Drive demo requests", "Get referral partners", "Sell a productized service", "Other"];

        function OutreachOS() {
            const [step, setStep] = useState(1);
            const [form, setForm] = useState({
                companyName: "", industry: "", offer: "", transformation: "",
                targetTitle: "", targetIndustry: "", targetPain: "", proof: "", goal: ""
            });
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [activeSeq, setActiveSeq] = useState(0);
            const [copied, setCopied] = useState(null);

            const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
            const isValid = {
                1: form.companyName && form.industry,
                2: form.offer && form.transformation,
                3: form.targetTitle && form.targetIndustry && form.targetPain && form.goal,
            };

            const generate = async () => {
                setLoading(true);
                setStep(4);
                // Note: In a live environment, you would call your API here
                // For this standalone version, we simulate the generation
                setTimeout(() => {
                    setResult({
                        emails: [
                            { label: "Email 1 — First Touch", subject: "Quick question for {{FirstName}}", body: "I noticed {{Company}} is scaling..." },
                            { label: "Email 2 — Follow-up", subject: "Bumping this up", body: "Just checking in on my last note..." }
                        ],
                        linkedin: "Hi {{FirstName}}, love the work you're doing at {{Company}}!",
                        tips: ["Always A/B test subject lines", "Keep it under 100 words"]
                    });
                    setLoading(false);
                }, 2000);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-3xl mx-auto">
                        <header className="flex justify-between items-center mb-12 border-b border-slate-800 pb-6">
                            <h1 className="sora text-2xl font-extrabold">Outreach<span className="text-[#00e5b4]">OS</span></h1>
                            <div className="text-xs text-slate-500 uppercase tracking-widest font-semibold">Step {step} of 4</div>
                        </header>

                        {step < 4 && (
                            <div className="bg-[#0c1929] border border-slate-800 p-8 rounded-xl shadow-2xl">
                                {step === 1 && (
                                    <div className="space-y-6">
                                        <h2 className="sora text-xl font-bold">Your Business</h2>
                                        <input className="w-full bg-[#060d1a] border border-slate-800 p-3 rounded-lg" placeholder="Company Name" onChange={(e) => set("companyName", e.target.value)} />
                                        <select className="w-full bg-[#060d1a] border border-slate-800 p-3 rounded-lg" onChange={(e) => set("industry", e.target.value)}>
                                            <option value="">Select Industry</option>
                                            {INDUSTRIES.map(i => <option key={i}>{i}</option>)}
                                        </select>
                                    </div>
                                )}
                                {step === 2 && (
                                    <div className="space-y-6">
                                        <h2 className="sora text-xl font-bold">Your Offer</h2>
                                        <textarea className="w-full bg-[#060d1a] border border-slate-800 p-3 rounded-lg" placeholder="What do you sell?" onChange={(e) => set("offer", e.target.value)} />
                                        <textarea className="w-full bg-[#060d1a] border border-slate-800 p-3 rounded-lg" placeholder="The result you deliver" onChange={(e) => set("transformation", e.target.value)} />
                                    </div>
                                )}
                                {step === 3 && (
                                    <div className="space-y-6">
                                        <h2 className="sora text-xl font-bold">Target Audience</h2>
                                        <input className="w-full bg-[#060d1a] border border-slate-800 p-3 rounded-lg" placeholder="Target Title" onChange={(e) => set("targetTitle", e.target.value)} />
                                        <input className="w-full bg-[#060d1a] border border-slate-800 p-3 rounded-lg" placeholder="Target Industry" onChange={(e) => set("targetIndustry", e.target.value)} />
                                        <select className="w-full bg-[#060d1a] border border-slate-800 p-3 rounded-lg" onChange={(e) => set("goal", e.target.value)}>
                                            <option value="">Target Goal</option>
                                            {GOALS.map(g => <option key={g}>{g}</option>)}
                                        </select>
                                        <textarea className="w-full bg-[#060d1a] border border-slate-800 p-3 rounded-lg" placeholder="Their main pain point" onChange={(e) => set("targetPain", e.target.value)} />
                                    </div>
                                )}
                                
                                <div className="mt-8 flex justify-between">
                                    <button onClick={() => setStep(s => s - 1)} className={`text-slate-400 ${step === 1 ? 'invisible' : ''}`}>Back</button>
                                    <button 
                                        disabled={!isValid[step]} 
                                        onClick={step === 3 ? generate : () => setStep(s => s + 1)} 
                                        className="bg-[#00e5b4] text-[#060d1a] px-8 py-3 rounded-lg font-bold hover:bg-[#00ffca] disabled:opacity-50"
                                    >
                                        {step === 3 ? "Generate System" : "Next Step"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {loading && (
                            <div className="text-center py-20">
                                <div className="w-12 h-12 border-4 border-slate-800 border-t-[#00e5b4] rounded-full animate-spin-custom mx-auto mb-6"></div>
                                <h2 className="sora text-2xl font-bold">Crafting your system...</h2>
                            </div>
                        )}

                        {step === 4 && result && !loading && (
                            <div className="bg-[#0c1929] border border-slate-800 p-8 rounded-xl shadow-2xl">
                                <h2 className="sora text-2xl font-bold mb-6">Your Custom Sequence</h2>
                                <div className="bg-[#060d1a] p-6 rounded-lg border border-slate-800 mb-6">
                                    <h3 className="text-[#00e5b4] font-bold mb-2">{result.emails[activeSeq].label}</h3>
                                    <p className="text-sm text-slate-400 mb-4">Subject: {result.emails[activeSeq].subject}</p>
                                    <div className="whitespace-pre-wrap">{result.emails[activeSeq].body}</div>
                                </div>
                                <button onClick={() => setStep(1)} className="text-[#00e5b4] font-bold">Start Over</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OutreachOS />);
    </script>
</body>
</html>
